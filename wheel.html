<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎡 幸运转盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow:hidden;-webkit-tap-highlight-color:transparent}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 50%,rgba(255,107,157,.08),transparent 60%)}
.title{font-size:clamp(1.5rem,5vw,2.2rem);font-weight:900;margin-bottom:.5rem;text-align:center;background:linear-gradient(135deg,#ff6b9d,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:1.5rem}

.wheel-area{position:relative;width:min(80vw,340px);height:min(80vw,340px)}
.pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:10}
.pointer svg{width:30px;height:36px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6))}
#canvas{width:100%;height:100%;border-radius:50%}

.spin-btn{margin-top:1.5rem;width:110px;height:110px;border-radius:50%;border:3px solid #ffd700;background:linear-gradient(135deg,#ff6b9d,#c471ed);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;transition:all .3s;box-shadow:0 0 30px rgba(255,107,157,.3);letter-spacing:.05em}
.spin-btn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(255,107,157,.5)}
.spin-btn:active{transform:scale(.95)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spin-count{color:rgba(255,255,255,.3);font-size:.75rem;margin-top:1rem}

.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.modal.show{display:flex}
.modal-card{background:#16213e;border:1px solid rgba(255,107,157,.2);border-radius:24px;padding:2.5rem 2rem;text-align:center;max-width:340px;width:90%;animation:popIn .5s cubic-bezier(.16,1,.3,1)}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.modal-emoji{font-size:4rem;margin-bottom:1rem}
.modal-title{font-size:1.3rem;font-weight:800;margin-bottom:.5rem}
.modal-desc{color:rgba(255,255,255,.6);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem}
.modal-btn{padding:.8rem 2rem;border:none;border-radius:12px;background:linear-gradient(135deg,#ff6b9d,#c471ed);color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="bg-glow"></div>
<h1 class="title">幸运大转盘</h1>
<p class="sub">转一转，看看你的运气～</p>

<div class="wheel-area">
  <div class="pointer">
    <svg viewBox="0 0 30 36"><polygon points="15,36 0,0 30,0" fill="#ffd700"/><circle cx="15" cy="6" r="5" fill="#ffd700"/></svg>
  </div>
  <canvas id="canvas" width="680" height="680"></canvas>
</div>

<button class="spin-btn" id="spinBtn" onclick="doSpin()">开始转</button>
<div class="spin-count" id="spinCount">已转 0 次</div>

<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-emoji" id="mEmoji"></div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-desc" id="mDesc"></div>
    <button class="modal-btn" onclick="document.getElementById('modal').classList.remove('show')">好的</button>
  </div>
</div>

<script>
const prizes=[
  {text:'跟男朋友领个红包',color:'#ff6b9d',win:true},
  {text:'再接再厉',color:'#667eea'},
  {text:'谢谢参与',color:'#4a4e69'},
  {text:'下次一定',color:'#2263a0'},
  {text:'差一点点',color:'#9b59b6'},
  {text:'运气不佳',color:'#3d5a80'},
  {text:'缘分未到',color:'#2d6a4f'},
  {text:'再来一次',color:'#e07a5f'},
];
const N=prizes.length;
const ARC=2*Math.PI/N;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const CX=340,CY=340,R=320;
let currentDeg=0,spinning=false,spinCount=0;

// Draw wheel at given angle (degrees)
function draw(deg){
  ctx.clearRect(0,0,680,680);
  ctx.save();
  ctx.translate(CX,CY);
  ctx.rotate(deg*Math.PI/180);

  prizes.forEach((p,i)=>{
    const s=i*ARC-Math.PI/2;
    const e=s+ARC;
    // Segment
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,R,s,e);
    ctx.closePath();
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.12)';
    ctx.lineWidth=2;
    ctx.stroke();

    // Text
    ctx.save();
    const mid=s+ARC/2;
    ctx.rotate(mid);
    ctx.translate(R*0.62,0);
    // Flip text if on left side so it reads correctly
    if(mid>Math.PI/2&&mid<3*Math.PI/2){
      ctx.rotate(Math.PI);
      ctx.translate(-R*0.12,0); // offset for readability
    }
    ctx.fillStyle='#fff';
    ctx.font=`bold ${p.win?26:24}px "Segoe UI",system-ui,sans-serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(p.text,0,0);
    ctx.restore();
  });

  // Center circle
  ctx.beginPath();
  ctx.arc(0,0,30,0,2*Math.PI);
  ctx.fillStyle='#1a1a2e';
  ctx.fill();
  ctx.strokeStyle='#ffd700';
  ctx.lineWidth=4;
  ctx.stroke();

  // Outer ring
  ctx.beginPath();
  ctx.arc(0,0,R+2,0,2*Math.PI);
  ctx.strokeStyle='#ffd700';
  ctx.lineWidth=5;
  ctx.stroke();

  ctx.restore();
}

// Initial draw
draw(0);

// Pointer is at TOP (12 o'clock). Segment 0 starts at -90deg (top).
// So segment 0's CENTER is at top naturally: -90 + ARC/2
// We need the wheel to rotate so that the target segment's center aligns with the pointer (top).
// When canvas is at rotation=0, segment 0 center is at top.
// To put segment N at top: rotate by -(N * ARC) in radians = -(N * ARC * 180/PI) degrees.

function easeOut(t){return 1-Math.pow(1-t,3)}

function doSpin(){
  if(spinning)return;
  spinning=true;
  spinCount++;
  document.getElementById('spinCount').textContent=`已转 ${spinCount} 次`;
  const btn=document.getElementById('spinBtn');
  btn.disabled=true;
  btn.textContent='转转转...';

  // Choose target
  let targetIdx=spinCount===1?0:1+Math.floor(Math.random()*(N-1));

  // We need: currentDeg + extraRot ≡ -(targetIdx * 360/N)  (mod 360)
  // So: extraRot = fullSpins*360 + targetAngle - (currentDeg mod 360)
  const segAngle=targetIdx*(360/N);
  // Current deg modulo 360
  const curMod=((currentDeg%360)+360)%360;
  // We want the segment center to be at top. When deg=0, seg0 center is at top.
  // Rotating by -segAngle puts segN center at top.
  // But we're rotating positive (clockwise), so we add full rotations.
  const fullSpins=5+Math.floor(Math.random()*2); // 5-6 full spins
  const targetDeg=currentDeg+fullSpins*360+(360-segAngle)-(curMod);

  const startDeg=currentDeg;
  const totalRot=targetDeg-startDeg;
  const duration=4000;
  const startTime=performance.now();

  function tick(now){
    const elapsed=now-startTime;
    const t=Math.min(elapsed/duration,1);
    const eased=easeOut(t);
    currentDeg=startDeg+totalRot*eased;
    draw(currentDeg);
    if(t<1){
      requestAnimationFrame(tick);
    }else{
      currentDeg=targetDeg;
      spinning=false;
      btn.disabled=false;
      btn.textContent='再转一次';
      showResult(targetIdx);
    }
  }
  requestAnimationFrame(tick);
}

function showResult(idx){
  const p=prizes[idx];
  document.getElementById('mEmoji').textContent=p.win?'🧧':'😢';
  document.getElementById('mTitle').textContent=p.text;
  document.getElementById('mDesc').textContent=p.win?
    '恭喜你中奖啦！快去找男朋友领红包吧～':
    '没关系，运气会越来越好的！再转一次试试？';
  document.getElementById('modal').classList.add('show');
  if(p.win)confetti();
}

function confetti(){
  const colors=['#ff6b9d','#ffd700','#c471ed','#667eea','#4ade80','#ff8fb1'];
  for(let i=0;i<50;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;pointer-events:none;z-index:200;left:${Math.random()*100}vw;top:-10px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};background:${colors[i%colors.length]};animation:cf ${2+Math.random()*2}s linear ${Math.random()*.5}s forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
  if(!document.getElementById('cfStyle')){
    const s=document.createElement('style');s.id='cfStyle';
    s.textContent='@keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}';
    document.head.appendChild(s);
  }
}
</script>
</body>
</html>
