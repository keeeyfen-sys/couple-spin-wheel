<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎡 幸运转盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow:hidden;-webkit-tap-highlight-color:transparent}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 50%,rgba(255,107,157,.08),transparent 60%)}

.title{font-size:clamp(1.5rem,5vw,2.2rem);font-weight:900;margin-bottom:1.5rem;text-align:center;background:linear-gradient(135deg,#ff6b9d,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
.sub{color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:2rem}

.wheel-wrap{position:relative;width:min(85vw,360px);height:min(85vw,360px)}
.wheel-wrap svg{width:100%;height:100%;filter:drop-shadow(0 0 30px rgba(255,107,157,.2))}
.wheel-wrap svg.spin{transition:transform 4s cubic-bezier(.17,.67,.12,.99)}

.pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:28px solid #ffd700;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));z-index:10}
.pointer::after{content:'';position:absolute;top:-32px;left:-8px;width:16px;height:16px;background:#ffd700;border-radius:50%;box-shadow:0 0 10px rgba(255,215,0,.5)}

.spin-btn{margin-top:2rem;width:120px;height:120px;border-radius:50%;border:3px solid #ffd700;background:linear-gradient(135deg,#ff6b9d,#c471ed);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all .3s;box-shadow:0 0 30px rgba(255,107,157,.3);letter-spacing:.05em}
.spin-btn:hover{transform:scale(1.08);box-shadow:0 0 50px rgba(255,107,157,.5)}
.spin-btn:active{transform:scale(.95)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* Result modal */
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.modal.show{display:flex}
.modal-card{background:#16213e;border:1px solid rgba(255,107,157,.2);border-radius:24px;padding:2.5rem 2rem;text-align:center;max-width:340px;width:90%;animation:popIn .5s cubic-bezier(.16,1,.3,1)}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.modal-emoji{font-size:4rem;margin-bottom:1rem}
.modal-title{font-size:1.3rem;font-weight:800;margin-bottom:.5rem}
.modal-desc{color:rgba(255,255,255,.6);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem}
.modal-btn{padding:.8rem 2rem;border:none;border-radius:12px;background:linear-gradient(135deg,#ff6b9d,#c471ed);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s}
.modal-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,107,157,.3)}

/* Confetti */
.confetti{position:fixed;pointer-events:none;z-index:200}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

.spin-count{color:rgba(255,255,255,.35);font-size:.75rem;margin-top:1.5rem}
</style>
</head>
<body>
<div class="bg-glow"></div>

<h1 class="title">幸运大转盘</h1>
<p class="sub">转一转，看看你的运气～</p>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <svg id="wheel" viewBox="0 0 300 300">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
  </svg>
</div>

<button class="spin-btn" id="spinBtn" onclick="spin()">开始转</button>
<div class="spin-count" id="spinCount">已转 0 次</div>

<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-emoji" id="modalEmoji"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <button class="modal-btn" onclick="closeModal()">好的</button>
  </div>
</div>

<script>
const prizes=[
  {text:'跟男朋友领个红包',color:'#ff6b9d',win:true},
  {text:'再接再厉',color:'#667eea',win:false},
  {text:'谢谢参与',color:'#4a4e69',win:false},
  {text:'下次一定',color:'#2263a0',win:false},
  {text:'差一点点',color:'#9b59b6',win:false},
  {text:'运气不佳',color:'#3d5a80',win:false},
  {text:'缘分未到',color:'#2d6a4f',win:false},
  {text:'再来一次',color:'#e07a5f',win:false},
];
const n=prizes.length;
const arc=2*Math.PI/n;
let spinCount=0,spinning=false;

// Build wheel
const svg=document.getElementById('wheel');
const cx=150,cy=150,r=140;
prizes.forEach((p,i)=>{
  const startAngle=i*arc-Math.PI/2;
  const endAngle=startAngle+arc;
  const x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
  const x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
  const large=arc>Math.PI?1:0;

  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z`);
  path.setAttribute('fill',p.color);
  path.setAttribute('stroke','rgba(255,255,255,.1)');
  path.setAttribute('stroke-width','1');
  svg.appendChild(path);

  // Text
  const midAngle=startAngle+arc/2;
  const tx=cx+(r*.62)*Math.cos(midAngle);
  const ty=cy+(r*.62)*Math.sin(midAngle);
  const deg=midAngle*180/Math.PI;
  const text=document.createElementNS('http://www.w3.org/2000/svg','text');
  text.setAttribute('x',tx);
  text.setAttribute('y',ty);
  text.setAttribute('fill','#fff');
  text.setAttribute('font-size',p.win?'12':'11');
  text.setAttribute('font-weight',p.win?'800':'600');
  text.setAttribute('text-anchor','middle');
  text.setAttribute('dominant-baseline','central');
  text.setAttribute('transform',`rotate(${deg>90&&deg<270?deg+180:deg},${tx},${ty})`);
  text.textContent=p.text;
  svg.appendChild(text);

  // Center circle
  const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx',cx);circle.setAttribute('cy',cy);circle.setAttribute('r','20');
  circle.setAttribute('fill','#1a1a2e');circle.setAttribute('stroke','#ffd700');circle.setAttribute('stroke-width','2');
  svg.appendChild(circle);

  // Border ring
  const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',cx);ring.setAttribute('cy',cy);ring.setAttribute('r',r+2);
  ring.setAttribute('fill','none');ring.setAttribute('stroke','#ffd700');ring.setAttribute('stroke-width','3');
  svg.appendChild(ring);
});

function spin(){
  if(spinning)return;
  spinning=true;
  spinCount++;
  document.getElementById('spinCount').textContent=`已转 ${spinCount} 次`;

  const btn=document.getElementById('spinBtn');
  btn.disabled=true;
  btn.textContent='转转转...';

  // First spin always wins
  let targetIdx;
  if(spinCount===1){
    targetIdx=0; // 跟男朋友领个红包
  }else{
    // Random non-win (index 1-7)
    targetIdx=1+Math.floor(Math.random()*(n-1));
  }

  // Calculate rotation: pointer is at top (0 degrees)
  // Each segment's center = i*arc + arc/2 (from 0 = right side, but we need from top)
  // Wheel rotates clockwise, pointer stays at top
  // Target angle: we want the target segment to be at top (270 degrees / -90deg from right)
  const segCenter=targetIdx*arc+arc/2; // in radians from right
  const segDeg=segCenter*180/Math.PI; // 0=right, 90=down
  // Pointer is at top (270deg or -90). We need to rotate so segDeg aligns with 270
  // targetRotation = 270 - segDeg (but spin multiple full rotations first)
  const baseRot=360*5+270-segDeg+Math.random()*6-3; // 5 full spins + target

  svg.style.transform=`rotate(${baseRot}deg)`;

  setTimeout(()=>{
    showModal(targetIdx);
    spinning=false;
    btn.disabled=false;
    btn.textContent='再转一次';
  },4200);
}

function showModal(idx){
  const p=prizes[idx];
  const modal=document.getElementById('modal');
  document.getElementById('modalEmoji').textContent=p.win?'🧧':'😢';
  document.getElementById('modalTitle').textContent=p.text;
  document.getElementById('modalDesc').textContent=p.win?
    '恭喜你中奖啦！快去找男朋友领红包吧～':
    '没关系，运气会越来越好的！再转一次试试？';
  modal.classList.add('show');

  if(p.win)confetti();
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

function confetti(){
  const colors=['#ff6b9d','#ffd700','#c471ed','#667eea','#4ade80','#ff8fb1'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';
    c.style.top='-10px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(6+Math.random()*8)+'px';
    c.style.height=(6+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=Math.random()*.5+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}
</script>
</body>
</html>
